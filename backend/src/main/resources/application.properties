# Application Configuration
spring.application.name=CodeofDuty
server.port=8080

# H2 Database Configuration (Memory Mode for Hackathon Stability)
spring.datasource.url=jdbc:h2:mem:codeofduty;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.codeofduty.platform=DEBUG

# Spring Security / CORS Configuration (Hackathon Simplified)
# Allowing both 5173 and 5174 for rapid local development
spring.mvc.cors.allowed-origins=http://localhost:5173,http://localhost:5174
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

