# ==========================================
# 🚀 CORE APPLICATION
# ==========================================
spring.application.name=CodeofDuty
# Render automatically injects a PORT variable. If it's missing, default to 8080 locally.
server.port=${PORT:8080}

# ==========================================
# 🐘 DATABASE (Supabase PostgreSQL)
# ==========================================
# ALL secrets are now safely injected from Render environment variables!
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# ==========================================
# 🗄️ JPA / HIBERNATE
# ==========================================
# Hibernate automatically detects PostgreSQL now, so we removed the dialect line to avoid warnings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 🌐 SECURITY / CORS
# ==========================================
# Banish Localhost! Uses Render's variable, defaults to 5173 for local testing.
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# 📝 LOGGING
# ==========================================
logging.level.com.codeofduty.platform=DEBUG

# ==========================================
# 🔌 EXTERNAL APIS (Secured)
# ==========================================
tomtom.api.key=${TOMTOM_API_KEY}
openweather.api.key=${OPENWEATHER_API_KEY}