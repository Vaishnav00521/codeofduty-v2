# ==========================================
# 🚀 CORE APPLICATION
# ==========================================
spring.application.name=CodeofDuty
server.port=8080
server.address=0.0.0.0

# ==========================================
# 🗄️ JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 🐘 DATABASE (The Bulletproof Setup)
# ==========================================
spring.datasource.driverClassName=org.postgresql.Driver
# Port 5432 is REQUIRED. sslmode and prepareThreshold ensure Pooler compatibility.
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.juzkwhhkmrcyllwrhqba
# BULLETPROOF FALLBACK: Uses Render env var, but injects the real password if Render fails.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Vaish@005210}

# HIKARI BUG FIX: SELECT 1 prevents the PgBouncer setNetworkTimeout crash!
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000

# ==========================================
# 🌐 SECURITY / CORS
# ==========================================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# 📝 LOGGING
# ==========================================
logging.level.com.codeofduty.platform=INFO

# ==========================================
# 🔌 EXTERNAL APIS
# ==========================================
tomtom.api.key=${TOMTOM_API_KEY:dummy_key}
openweather.api.key=${OPENWEATHER_API_KEY:dummy_key}