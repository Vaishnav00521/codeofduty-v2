# ==========================================
# 🚀 CORE APPLICATION
# ==========================================
spring.application.name=CodeofDuty
server.port=8080
server.address=0.0.0.0

# ==========================================
# 🗄️ JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 🐘 DATABASE (Hardcoded URL to bypass Render injection bugs)
# ==========================================
spring.datasource.driverClassName=org.postgresql.Driver
# URL and Username are hardcoded to the IPv4 Pooler. Password remains secret.
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.juzkwhhkmrcyllwrhqba
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Hikari Pool Safety Limits
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1

# ==========================================
# 🌐 SECURITY / CORS
# ==========================================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# 📝 LOGGING
# ==========================================
logging.level.com.codeofduty.platform=INFO

# ==========================================
# 🔌 EXTERNAL APIS
# ==========================================
tomtom.api.key=${TOMTOM_API_KEY:dummy_key}
openweather.api.key=${OPENWEATHER_API_KEY:dummy_key}