# ==========================================
# 🚀 CORE APPLICATION
# ==========================================
spring.application.name=CodeofDuty
server.port=${PORT:8080}

# ==========================================
# 🗄️ JPA / HIBERNATE (Supabase Pooler Fix)
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 🐘 DATABASE (Verified aws-1 Pooler URL)
# ==========================================
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.juzkwhhkmrcyllwrhqba
spring.datasource.password=Vaish@005210

# Extreme Connection Safety
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=540000

# ==========================================
# 🌐 SECURITY / CORS
# ==========================================
frontend.url=https://codeofduty-v2.vercel.app

# ==========================================
# 📝 LOGGING & EXTERNAL APIS
# ==========================================
logging.level.com.codeofduty.platform=INFO
# ==========================================
# 🔌 EXTERNAL APIS (Now with safe fallbacks!)
