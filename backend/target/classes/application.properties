# ==========================================
# 🚀 CORE APPLICATION
# ==========================================
spring.application.name=CodeofDuty
server.port=${PORT:8080}

# ==========================================
# 🗄️ JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Stop metadata scan to prevent pooler crashes
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ==========================================
# 🐘 DATABASE (Strictly Port 6543 for Pooler)
# ==========================================
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.juzkwhhkmrcyllwrhqba
spring.datasource.password=Vaish@005210

# High-Tolerance Hikari Settings
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.max-lifetime=540000

# ==========================================
# 🌐 SECURITY / LOGGING / APIS
# ==========================================
frontend.url=https://codeofduty-frontend.vercel.app
logging.level.com.codeofduty.platform=INFO

# Safe fallbacks so the ApplicationContext doesn't crash
tomtom.api.key=${TOMTOM_API_KEY:dummy_key}
openweather.api.key=${OPENWEATHER_API_KEY:dummy_key}