# ==========================================
# 🚀 CORE APPLICATION (Bulletproof Port)
# ==========================================
spring.application.name=CodeofDuty
server.port=8080
server.address=0.0.0.0

# ==========================================
# 🗄️ JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 🐘 DATABASE (Resilient Hikari Pool)
# ==========================================
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dummy}

# Prevent Supabase Pooler from dropping idle connections
spring.datasource.hikari.max-lifetime=20000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=15000
spring.datasource.hikari.idle-timeout=10000

# ==========================================
# 🌐 SECURITY / CORS
# ==========================================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# 📝 LOGGING
# ==========================================
logging.level.com.codeofduty.platform=INFO

# ==========================================
# 🔌 EXTERNAL APIS
# ==========================================
tomtom.api.key=${TOMTOM_API_KEY:dummy_key}
openweather.api.key=${OPENWEATHER_API_KEY:dummy_key}