# ==========================================
# 🚀 CORE APPLICATION
# ==========================================
spring.application.name=CodeofDuty
server.port=${PORT:8080}

# ==========================================
# 🗄️ JPA / HIBERNATE (Explicitly Defined)
# ==========================================
# This line prevents the "Unable to determine Dialect" crash
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 🐘 DATABASE (Dynamic with Safe Fallbacks)
# ==========================================
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:dummy}

# ==========================================
# 🌐 SECURITY / CORS
# ==========================================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# 📝 LOGGING
# ==========================================
logging.level.com.codeofduty.platform=DEBUG

# ==========================================
# 🔌 EXTERNAL APIS (Secured)
# ==========================================
tomtom.api.key=${TOMTOM_API_KEY:dummy_key}
openweather.api.key=${OPENWEATHER_API_KEY:dummy_key}