# ==========================================
# 🚀 CORE APPLICATION
# ==========================================
spring.application.name=CodeofDuty
# Render automatically injects a PORT variable. If it's missing, default to 8080 locally.
server.port=${PORT:8080}

# ==========================================
# 🐘 DATABASE (Supabase PostgreSQL)
# ==========================================
# Notice: No username/password inside this URL, and we added "jdbc:"
spring.datasource.url=jdbc:postgresql://db.juzkwhhkmrcyllwrhqba.supabase.co:5432/postgres
spring.datasource.username=postgres
# Notice: Removed the [ ] brackets!
spring.datasource.password=Vaish@005210
spring.datasource.driverClassName=org.postgresql.Driver

# ==========================================
# 🗄️ JPA / HIBERNATE
# ==========================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# 🌐 SECURITY / CORS
# ==========================================
# Banish Localhost! Uses Render's variable, defaults to 5173 for local testing.
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ==========================================
# 📝 LOGGING
# ==========================================
logging.level.com.codeofduty.platform=DEBUG

# ==========================================
# 🔌 EXTERNAL APIS (Secured)
# ==========================================
tomtom.api.key=${TOMTOM_API_KEY}
openweather.api.key=${OPENWEATHER_API_KEY}